remote_theme: pages-themes/architect@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

title: "LearnHub — Agentic AI Engineering"
description: "Learn to build autonomous AI agents from first principles to production. LangChain, LangGraph, CrewAI, Autogen, RAG, multi-agent systems, and cloud deployment."
url: "https://kpkaushik-sse.github.io"
baseurl: ""

author:
  name: "Khush Kaushik"
  email: "kpkaushik@virtualemployee.com"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/
future: true

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Collections
collections:
  courses:
    output: true
    permalink: /courses/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "courses"
    values:
      layout: "course"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - README.md
